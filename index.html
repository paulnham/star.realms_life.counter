<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Star Realms Authority Counter</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Orbitron, Impact, system-ui, sans-serif;
  color: white;
  background:
    radial-gradient(circle at 20% 20%, rgba(0, 170, 255, 0.35), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(255, 0, 80, 0.35), transparent 25%),
    radial-gradient(circle at 50% 80%, rgba(80, 0, 180, 0.35), transparent 30%),
    linear-gradient(135deg, #02040d, #07111f 45%, #100511);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-size: 90px 90px, 160px 160px;
  background-position: 0 0, 40px 60px;
  opacity: 0.25;
  pointer-events: none;
}

header {
  text-align: center;
  padding: 28px 16px 12px;
}

.logo {
  font-size: clamp(2.2rem, 8vw, 5rem);
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow:
    0 0 8px #ffffff,
    0 0 22px #00aaff,
    0 0 42px #004cff;
}

.subtitle {
  color: #7de8ff;
  letter-spacing: 8px;
  font-size: clamp(0.8rem, 2.5vw, 1.3rem);
  text-transform: uppercase;
}

.game {
  display: grid;
  grid-template-columns: repeat(2, minmax(280px, 1fr));
  gap: 28px;
  padding: 24px;
  max-width: 1300px;
  margin: 0 auto;
}

.player {
  position: relative;
  padding: 28px;
  border-radius: 22px;
  background: rgba(5, 12, 30, 0.78);
  border: 2px solid;
  box-shadow: inset 0 0 40px rgba(255,255,255,0.08), 0 0 35px;
  overflow: hidden;
}

.player::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent),
    radial-gradient(circle, transparent 30%, rgba(255,255,255,0.06));
  pointer-events: none;
}

.player.one {
  border-color: #ff3030;
  box-shadow: 0 0 30px rgba(255, 20, 20, 0.55);
}

.player.two {
  border-color: #00aaff;
  box-shadow: 0 0 30px rgba(0, 170, 255, 0.55);
}

.player h2 {
  position: relative;
  margin: 0 0 20px;
  text-align: center;
  font-size: 2rem;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.score {
  position: relative;
  text-align: center;
  font-size: clamp(6rem, 18vw, 11rem);
  font-weight: 900;
  line-height: 1;
  margin: 20px 0 28px;
  text-shadow:
    0 0 12px white,
    0 0 28px currentColor;
}

.player.one .score {
  color: #fff2f2;
}

.player.two .score {
  color: #eef9ff;
}

.controls {
  position: relative;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

button {
  border: 0;
  border-radius: 12px;
  padding: 18px 10px;
  color: white;
  font-size: 1.5rem;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 1px;
  text-shadow: 0 2px 3px black;
  box-shadow: inset 0 0 18px rgba(255,255,255,0.15), 0 6px 0 rgba(0,0,0,0.35);
}

button:active {
  transform: translateY(4px);
  box-shadow: inset 0 0 18px rgba(255,255,255,0.15), 0 2px 0 rgba(0,0,0,0.35);
}

.damage {
  background: linear-gradient(#d52929, #690909);
  border: 1px solid #ff4d4d;
}

.heal {
  background: linear-gradient(#21b84c, #075e24);
  border: 1px solid #5dff80;
}

.toolbar {
  max-width: 800px;
  margin: 10px auto 30px;
  padding: 18px;
  border-radius: 18px;
  background: rgba(5, 12, 30, 0.86);
  border: 1px solid #4aa3ff;
  box-shadow: 0 0 24px rgba(0, 170, 255, 0.3);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 14px;
  align-items: center;
}

.amount-box {
  text-align: center;
}

.amount-box label {
  display: block;
  color: #7de8ff;
  font-size: 0.8rem;
  letter-spacing: 3px;
  margin-bottom: 6px;
}

input {
  width: 100%;
  max-width: 160px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #4aa3ff;
  background: #030814;
  color: white;
  font-size: 1.8rem;
  font-weight: 900;
  text-align: center;
}

.small {
  padding: 12px 18px;
  font-size: 1.5rem;
  background: linear-gradient(#173b64, #071d36);
  border: 1px solid #4aa3ff;
}

.reset {
  background: linear-gradient(#3f4c5f, #111823);
  border: 1px solid #b7c7d9;
  font-size: 1.2rem;
  height: 100%;
}

.footer {
  text-align: center;
  color: #7de8ff;
  letter-spacing: 5px;
  padding-bottom: 24px;
  opacity: 0.85;
}

@media (max-width: 760px) {
  .game {
    grid-template-columns: 1fr;
    padding: 14px;
  }

  .toolbar {
    margin-inline: 14px;
    grid-template-columns: auto 1fr auto;
  }

  .logo {
    letter-spacing: 3px;
  }
}
</style>
</head>

<body>
<header>
  <div class="logo">Star Realms</div>
  <div class="subtitle">Authority Counter</div>
</header>

<main class="game">
  <section class="player one">
    <h2>Player 1</h2>
    <div class="score" id="score1">50</div>

    <div class="controls">
      <button class="damage" onclick="changeScore(1, -1)">-1</button>
      <button class="damage" onclick="changeScore(1, -5)">-5</button>
      <button class="damage" onclick="changeScore(1, -customAmount())">-X</button>

      <button class="heal" onclick="changeScore(1, 1)">+1</button>
      <button class="heal" onclick="changeScore(1, 5)">+5</button>
      <button class="heal" onclick="changeScore(1, customAmount())">+X</button>
    </div>
  </section>

  <section class="player two">
    <h2>Player 2</h2>
    <div class="score" id="score2">50</div>

    <div class="controls">
      <button class="damage" onclick="changeScore(2, -1)">-1</button>
      <button class="damage" onclick="changeScore(2, -5)">-5</button>
      <button class="damage" onclick="changeScore(2, -customAmount())">-X</button>

      <button class="heal" onclick="changeScore(2, 1)">+1</button>
      <button class="heal" onclick="changeScore(2, 5)">+5</button>
      <button class="heal" onclick="changeScore(2, customAmount())">+X</button>
    </div>
  </section>
</main>

<section class="toolbar">
  <button class="small" onclick="adjustCustom(-1)">−</button>

  <div class="amount-box">
    <label for="amount">CUSTOM AMOUNT</label>
    <input id="amount" type="number" value="10" min="1" />
  </div>

  <button class="small" onclick="adjustCustom(1)">+</button>

  <button class="reset" onclick="resetGame()">↻ RESET</button>
</section>

<div class="footer">DESTROY • DRAW • DOMINATE</div>

<script>
const STARTING_AUTHORITY = 50;

let scores = {
  1: STARTING_AUTHORITY,
  2: STARTING_AUTHORITY
};

function changeScore(player, amount) {
  scores[player] += amount;

  const scoreEl = document.getElementById(`score${player}`);
  scoreEl.textContent = scores[player];

  if (scores[player] <= 0) {
    scoreEl.style.color = "#ff3b3b";
  } else {
    scoreEl.style.color = "";
  }
}

function customAmount() {
  const value = Number(document.getElementById("amount").value);
  return Number.isFinite(value) && value > 0 ? value : 1;
}

function adjustCustom(amount) {
  const input = document.getElementById("amount");
  const nextValue = Math.max(1, customAmount() + amount);
  input.value = nextValue;
}

function resetGame() {
  scores[1] = STARTING_AUTHORITY;
  scores[2] = STARTING_AUTHORITY;

  for (const player of [1, 2]) {
    const scoreEl = document.getElementById(`score${player}`);
    scoreEl.textContent = STARTING_AUTHORITY;
    scoreEl.style.color = "";
  }
}
</script>
</body>
</html>
